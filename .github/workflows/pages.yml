name: Publish download page

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/pages.yml
      - docs/download/**
      - install.bat
      - public/modatory-logo.svg
      - docs/download/mix-studio-wordmark.svg
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enables Pages (build_type: workflow) on first run — the repo had
          # Pages disabled, which failed every previous deploy with Not Found.
          enablement: true

      - name: Stage static site
        run: |
          mkdir -p _site
          cp docs/download/index.html _site/index.html
          cp install.bat _site/install.bat
          cp public/modatory-logo.svg _site/modatory-logo.svg
          cp docs/download/mix-studio-wordmark.svg _site/mix-studio-wordmark.svg
          cp docs/download/mix-studio-create.webp _site/mix-studio-create.webp
          cp docs/download/mix-studio-edit.png _site/mix-studio-edit.png
          cp docs/download/mix-studio-region.png _site/mix-studio-region.png
          cp docs/download/mix-studio-video.png _site/mix-studio-video.png
          cp docs/download/mix-studio-mobile.png _site/mix-studio-mobile.png
          cp docs/download/mix-studio-scail.png _site/mix-studio-scail.png
          cp docs/download/mix-studio-library.png _site/mix-studio-library.png
          cp docs/download/mix-studio-profiles-live.png _site/mix-studio-profiles-live.png
          cp docs/download/mix-studio-dependencies.png _site/mix-studio-dependencies.png
          cp docs/download/comfyui-logo.svg _site/comfyui-logo.svg
          cp -R docs/download/media _site/media
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
